plugins {
    id 'com.android.library'
}

repositories {
    google()
    mavenCentral()
}

android {
    compileSdk 35
    ndkVersion "27.1.12297006"

    defaultConfig {
        minSdk 24
        targetSdk 35
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    implementation "com.google.code.gson:gson:2.10.1"
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}
